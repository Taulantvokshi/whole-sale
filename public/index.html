<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect your Shopify store</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f6f6f7;
      }
      .card {
        background: #fff;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        width: 320px;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 1rem;
      }
      input {
        width: 100%;
        padding: 0.6rem;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
        margin-bottom: 1rem;
      }
      button {
        width: 100%;
        padding: 0.6rem;
        font-size: 1rem;
        color: #fff;
        background: #008060;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      button:hover {
        background: #006e52;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Connect your Shopify store</h1>
      <form action="/auth" method="get">
        <input
          type="text"
          name="shop"
          placeholder="your-store.myshopify.com"
          required
        />
        <button type="submit">Install app</button>
      </form>
    </div>
  </body>
</html>
